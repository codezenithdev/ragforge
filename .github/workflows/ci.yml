name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff==0.8.6
      - run: ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    # Non-blocking while the codebase adopts type hints; tighten to blocking later.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install mypy==1.14.1
      - run: mypy app

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps (CPU torch first, like the image)
        run: |
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Run tests
        # The suite is fully mocked — no API keys or services required.
        run: pytest -q
