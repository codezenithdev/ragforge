services:
  postgres:
    image: postgres:16-alpine
    container_name: briefr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: briefr
      POSTGRES_PASSWORD: briefr
      POSTGRES_DB: briefr
    # Host port 5433: a native PostgreSQL 17 already owns host :5432, which
    # would shadow this container for host-based connections (alembic, local
    # uvicorn). In-network services still use postgres:5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briefr -d briefr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: briefr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Vector store. The official image is the Rust-based Chroma server (no python /
  # curl / wget inside), so the healthcheck uses the bundled bash + /dev/tcp to
  # probe the v2 heartbeat. The server persists to /data inside the container.
  chroma:
    image: chromadb/chroma:1.5.9
    container_name: briefr-chroma
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/data
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        # NOTE: $$line escapes Compose's variable interpolation -> literal $line.
        - 'exec 3<>/dev/tcp/127.0.0.1/8000; printf "GET /api/v2/heartbeat HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; read -r line <&3; [[ "$$line" == *200* ]]'
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot Alembic migration step (P2.1): the single schema authority. Runs to
  # completion before backend/worker start; the app no longer calls create_all.
  migrate:
    build: ./backend
    container_name: briefr-migrate
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://briefr:briefr@postgres:5432/briefr
    command: alembic upgrade head
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: briefr-backend
    restart: unless-stopped
    # .env holds local-dev hosts (localhost); inside the compose network the
    # backend must reach Postgres / Redis / Chroma by service name, so override.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://briefr:briefr@postgres:5432/briefr
      REDIS_URL: redis://redis:6379
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      # Shared with the worker so the ingestion task can read staged uploads (P1.6).
      UPLOAD_DIR: /data/uploads
    ports:
      - "8000:8000"
    # Source bind-mount + --reload live in docker-compose.override.yml (dev only);
    # the base image runs gunicorn (P1.5).
    volumes:
      - uploads:/data/uploads
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Celery worker that runs the LangGraph brief pipeline. Reuses the backend
  # image; like backend, it only becomes startable once the Dockerfile lands.
  worker:
    build: ./backend
    container_name: briefr-worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://briefr:briefr@postgres:5432/briefr
      REDIS_URL: redis://redis:6379
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      UPLOAD_DIR: /data/uploads
    # -B runs the beat scheduler embedded in the worker (dev convenience; use a
    # dedicated beat service in prod) so the reconcile sweeper fires periodically.
    command: celery -A app.core.celery_app worker --loglevel=info -B
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time (the browser calls the API on
        # the HOST-published port, not the compose-internal one).
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: briefr-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  chromadata:
  uploads:
